stages:
  - stage: UITestsPipelineRun
    variables:
    - group: testPipelinesAuthToken
    - name: personalToken
      value: $[variables.personalAuthToken]
    - name: deviceAndroid
      value: $[variables.deviceAndroid]
    - name: deviceIos
      value: $[variables.deviceIos]
    - name: iosPipelineID
      value: $[variables.iosPipelineID]
    - name: androidPipelineID
      value: $[variables.androidPipelineID]
    - name: azureProjectID
      value: $[variables.azureProjectID]
    - name: dataCenter
      value: $[variables.dataCenter]
    - name: sauceLabsJsonString
      value: $[ stageDependencies.EnvironmentDeploymentBuild.environment_deployment_build.outputs['deploySauceLabs.mSauceLabsAppsID'] ]
    jobs:
      - job: run_tests_pipeline
        displayName: 'Start UITests Pipeline'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - template: 'npm-steps.yml'
            parameters:
              workingDirectory: 'CI/templates'
          - script: 'npm run startPipeline --jsonStringBase64="$(sauceLabsJsonString)" --token="$(personalToken)" --deviceAndroid=${{ variables.deviceIos }} --deviceIos=$(deviceIos) --androidPipelineID=$(androidPipelineID) --iosPipelineID=$(iosPipelineID) --azureProjectID=$(azureProjectID) --dataCenter=$(dataCenter)'
            timeoutInMinutes: 120
            workingDirectory: 'CI/templates'
            failOnStderr: true
